<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum Thread | GrapevineAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root{--bg-primary:#0a0f1e;--bg-secondary:#111827;--bg-card:#1a2235;--bg-input:#243050;--accent-green:#22c55e;--accent-purple:#8b5cf6;--accent-yellow:#fbbf24;--text-primary:#f1f5f9;--text-secondary:#94a3b8;--text-muted:#64748b;--border:#2d3748;--gradient-main:linear-gradient(135deg,#667eea 0%,#764ba2 100%);}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;}
        .navbar{background:var(--bg-secondary);border-bottom:1px solid var(--border);padding:0.75rem 2rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100;}
        .nav-back{color:var(--text-secondary);text-decoration:none;display:flex;align-items:center;gap:0.4rem;font-size:0.85rem;transition:color 0.2s;}
        .nav-back:hover{color:var(--accent-green);}
        .page{max-width:800px;margin:0 auto;padding:2rem;}

        .thread-main{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:1.5rem;}
        .thread-content{padding:1.75rem;}
        .thread-badges{display:flex;gap:0.5rem;margin-bottom:1rem;flex-wrap:wrap;}
        .badge{padding:0.25rem 0.7rem;border-radius:20px;font-size:0.72rem;font-weight:700;}
        .badge-farmer{background:rgba(34,197,94,0.15);color:#22c55e;}
        .badge-consultant{background:rgba(139,92,246,0.15);color:#8b5cf6;}
        .badge-resolved{background:rgba(16,185,129,0.15);color:#10b981;}
        .badge-open{background:rgba(251,191,36,0.15);color:#fbbf24;}
        .badge-cat{background:rgba(255,255,255,0.06);color:var(--text-muted);}
        .thread-title{font-size:1.5rem;font-weight:800;line-height:1.4;margin-bottom:1rem;}
        .thread-body{color:var(--text-secondary);line-height:1.8;font-size:0.9rem;white-space:pre-wrap;}
        .thread-meta{display:flex;align-items:center;gap:1.5rem;padding:1rem 1.75rem;border-top:1px solid var(--border);background:rgba(255,255,255,0.02);font-size:0.78rem;color:var(--text-muted);}
        .thread-meta-item{display:flex;align-items:center;gap:0.35rem;}

        /* Replies */
        .replies-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
        .replies-header h2{font-size:1rem;font-weight:700;}
        .reply-count{background:rgba(139,92,246,0.15);color:var(--accent-purple);border-radius:20px;padding:0.2rem 0.7rem;font-size:0.78rem;font-weight:700;}

        .reply-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:0.75rem;transition:border-color 0.2s;}
        .reply-card.solution{border-color:#10b981;background:rgba(16,185,129,0.04);}
        .reply-header{padding:0.9rem 1.25rem;display:flex;align-items:center;gap:0.75rem;border-bottom:1px solid var(--border);}
        .reply-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;}
        .avatar-farmer{background:linear-gradient(135deg,#22c55e,#16a34a);}
        .avatar-consultant{background:linear-gradient(135deg,#8b5cf6,#6d28d9);}
        .reply-username{font-weight:700;font-size:0.88rem;}
        .reply-time{font-size:0.74rem;color:var(--text-muted);margin-top:0.15rem;}
        .solution-badge{margin-left:auto;background:rgba(16,185,129,0.15);color:#10b981;padding:0.25rem 0.75rem;border-radius:20px;font-size:0.72rem;font-weight:700;display:flex;align-items:center;gap:0.3rem;}
        .reply-body{padding:1.1rem 1.25rem;color:var(--text-secondary);line-height:1.8;font-size:0.88rem;white-space:pre-wrap;}
        .reply-footer{padding:0.5rem 1.25rem;border-top:1px solid rgba(255,255,255,0.04);display:flex;align-items:center;gap:0.75rem;}
        .mark-solution-btn{padding:0.3rem 0.9rem;background:none;border:1px solid rgba(16,185,129,0.3);color:#10b981;border-radius:8px;font-size:0.75rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
        .mark-solution-btn:hover{background:rgba(16,185,129,0.15);}

        /* Reply box */
        .reply-box{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-top:1rem;}
        .reply-box h3{font-size:1rem;font-weight:700;margin-bottom:1rem;}
        .form-textarea{width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:10px;padding:0.75rem 1rem;color:var(--text-primary);font-size:0.88rem;outline:none;font-family:'Inter',sans-serif;min-height:120px;resize:vertical;transition:border-color 0.2s;}
        .form-textarea:focus{border-color:var(--accent-purple);}
        .reply-actions{display:flex;align-items:center;justify-content:flex-end;gap:0.75rem;margin-top:0.75rem;}
        .submit-reply-btn{padding:0.65rem 1.5rem;background:var(--gradient-main);border:none;border-radius:10px;color:white;font-size:0.88rem;font-weight:700;cursor:pointer;transition:opacity 0.2s;font-family:'Inter',sans-serif;}
        .submit-reply-btn:hover{opacity:0.88;}
        ::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-thumb{background:var(--border);}
    </style>
</head>
<body>
<nav class="navbar">
    <a href="/forum" class="nav-back"><i class="fa fa-arrow-left"></i> Forum</a>
    <span style="font-weight:600;font-size:0.9rem;" id="navTitle">Loading...</span>
</nav>

<div class="page">
    <!-- Thread -->
    <div id="threadContainer">
        <div style="text-align:center;padding:4rem;color:var(--text-muted);"><i class="fa fa-spinner fa-spin fa-2x"></i></div>
    </div>

    <!-- Replies -->
    <div class="replies-header">
        <h2>Answers <span class="reply-count" id="replyCount">0</span></h2>
    </div>
    <div id="repliesList"></div>

    <!-- Reply Box -->
    <div class="reply-box" id="replyBox">
        <h3>✍️ Write Your Answer</h3>
        <textarea class="form-textarea" id="replyInput" placeholder="Share your knowledge, experience, or advice. Be detailed and helpful."></textarea>
        <div class="reply-actions">
            <button class="submit-reply-btn" onclick="submitReply()"><i class="fa fa-paper-plane"></i> Post Answer</button>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login';
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    const threadId = window.location.pathname.split('/').pop();
    let threadOwnerId = null;

    async function loadThread() {
        try {
            const res = await fetch(`/api/forum/threads/${threadId}`);
            const data = await res.json();
            if (!data.success) { document.getElementById('threadContainer').innerHTML = '<p style="color:var(--accent-red);text-align:center;padding:3rem">Thread not found.</p>'; return; }

            const t = data.thread;
            threadOwnerId = t.user_id;
            document.getElementById('navTitle').textContent = t.title.slice(0, 60) + (t.title.length > 60 ? '...' : '');
            document.title = t.title + ' | GrapevineAI Forum';

            document.getElementById('threadContainer').innerHTML = `
                <div class="thread-main">
                    <div class="thread-content">
                        <div class="thread-badges">
                            <span class="badge badge-${t.user_role}">${t.user_role === 'consultant' ? '👨‍💼 Consultant' : '👩‍🌾 Farmer'}</span>
                            <span class="badge ${t.is_resolved ? 'badge-resolved' : 'badge-open'}">${t.is_resolved ? '✓ Resolved' : 'Open'}</span>
                            <span class="badge badge-cat">${t.category}</span>
                        </div>
                        <div class="thread-title">${escHtml(t.title)}</div>
                        <div class="thread-body">${escHtml(t.body)}</div>
                    </div>
                    <div class="thread-meta">
                        <div class="thread-meta-item"><i class="fa fa-user"></i> ${t.user_name}</div>
                        <div class="thread-meta-item"><i class="fa fa-clock"></i> ${t.created_at}</div>
                        <div class="thread-meta-item"><i class="fa fa-eye"></i> ${t.views} views</div>
                        <div class="thread-meta-item"><i class="fa fa-comment"></i> ${t.reply_count} answers</div>
                    </div>
                </div>`;

            renderReplies(data.replies || []);
        } catch(e) { console.error(e); }
    }

    function renderReplies(replies) {
        document.getElementById('replyCount').textContent = replies.length;
        const list = document.getElementById('repliesList');
        if (!replies.length) {
            list.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:2rem;font-size:0.9rem;">No answers yet. Be the first to help!</p>';
            return;
        }
        list.innerHTML = replies.map(r => {
            const initials = r.user_name.charAt(0).toUpperCase();
            const isSolution = r.is_solution;
            const isOwner = user._id === threadOwnerId || user.id === threadOwnerId;
            return `<div class="reply-card ${isSolution ? 'solution' : ''}">
                <div class="reply-header">
                    <div class="reply-avatar avatar-${r.user_role}">${initials}</div>
                    <div>
                        <div class="reply-username">${r.user_name} <span class="badge badge-${r.user_role}" style="font-size:0.65rem;">${r.user_role}</span></div>
                        <div class="reply-time">${r.created_at}</div>
                    </div>
                    ${isSolution ? '<div class="solution-badge"><i class="fa fa-check-circle"></i> Best Answer</div>' : ''}
                </div>
                <div class="reply-body">${escHtml(r.body)}</div>
                ${isOwner && !isSolution ? `<div class="reply-footer"><button class="mark-solution-btn" onclick="markSolution('${r._id}')"><i class="fa fa-check"></i> Mark as Solution</button></div>` : ''}
            </div>`;
        }).join('');
    }

    async function submitReply() {
        const body = document.getElementById('replyInput').value.trim();
        if (!body) { alert('Please write your answer.'); return; }
        try {
            const res = await fetch(`/api/forum/threads/${threadId}/replies`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ body })
            });
            const data = await res.json();
            if (data.success) { document.getElementById('replyInput').value = ''; loadThread(); }
            else alert(data.error || 'Failed to post answer.');
        } catch(e) { alert('Error posting answer.'); }
    }

    async function markSolution(replyId) {
        try {
            const res = await fetch(`/api/forum/threads/${threadId}/solve/${replyId}`, {
                method: 'POST', headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            if (data.success) loadThread();
        } catch(e) {}
    }

    function escHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    loadThread();
</script>
</body>
</html>
